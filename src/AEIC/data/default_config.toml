# Default performance model.
performance_model = "performance/sample_performance_model.toml"

# Engine database spreadsheet.
engine_file = "engines/sample_edb.xlsx"


[weather]

# Use loaded weather to calculate wind vectors.
use_weather = true

# Location of weather data.
weather_data_dir = "weather"

# Temporal layout of weather files on disk. One file per period.
# Options: annual, monthly, daily. (Per-hour files are not supported.)
file_resolution = "daily"

# Optional. Temporal resolution of data within each file. Defaults to
# file_resolution (one period-mean per file). Must be finer-or-equal to
# file_resolution. Options: annual, monthly, daily, hourly.
# data_resolution = "hourly"

# Optional. strftime-style filename pattern relative to weather_data_dir.
# Defaults from file_resolution: %Y.nc (annual), %Y-%m.nc (monthly),
# %Y-%m-%d.nc (daily). Permitted tokens depend on file_resolution.
# file_format = "%Y%m%d.nc"


[emissions]

# Fuel files stored in src/AEIC/data/fuels/ - current options include:
#   conventional_jetA
fuel = "conventional_jetA"

# Compute CO₂ emissions with EI in fuels file.
co2_enabled = true

# Compute H₂O emissions with EI in fuels file.
h2o_enabled = true

# Compute SOx emissions with EI in fuels file.
sox_enabled = true

# Options:
#   P3T3: Pt3, Tt3 method;
#   BFFM2: Boeing Fuel flow method 2;
#   none: Do not compute NOx emissions.
nox_method = "BFFM2"

# Options:
#   BFFM2: Boeing Fuel flow method 2
#   none: Do not compute HC emissions
hc_method = "BFFM2"

# Options:
#   BFFM2: Boeing Fuel flow method 2;
#   none: Do not compute CO emissions.
co_method = "BFFM2"

# Options:
#   MEEM:    Mission Emissions Estimation Methodology (MEEM) based on Ahrens et
#            al. (2022), SCOPE11, and the methodology of Peck et al. (2013);
#   none:    Do not compute nvPM emissions.
nvpm_method = "MEEM"

# Options:
#   trajectory: emissions calculated for entire trajectory (takeoff, climb,
#               cruise, descent);
#   lto:        emissions only calculated for cruise, LTO data used for takeoff,
#               climb, approach.
climb_descent_mode = "trajectory"

# Compute emissions from APU.
apu_enabled = true

# Compute emissions from GSE.
gse_enabled = true

# Compute lifecycle emissions.
lifecycle_enabled = true
